<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" role="img" aria-label="Sonagi Beauty">
  <title>Sonagi Beauty</title>
  <!-- Navy filled background with subtle rounded corners (iOS will mask anyway) -->
  <rect x="0" y="0" width="180" height="180" rx="36" fill="#1a2744"/>

  <!-- Centered monogram at ~70% scale. Mark canvas is 100x100;
       scaled to 126 (70% of 180), centered with translate. -->
  <g transform="translate(27 27) scale(1.26)">
    <!-- Peach raindrop -->
    <path d="M 50 12
             C 50 12, 44 20, 44 25
             C 44 28.3, 46.7 31, 50 31
             C 53.3 31, 56 28.3, 56 25
             C 56 20, 50 12, 50 12 Z"
          fill="#f5c4aa"/>
    <!-- Italic S in cream (reverse since background is navy) -->
    <text x="50" y="82"
          text-anchor="middle"
          font-family="Fraunces, 'Cormorant Garamond', Georgia, serif"
          font-weight="300"
          font-style="italic"
          font-size="76"
          fill="#faf8f5">S</text>
  </g>
</svg>
